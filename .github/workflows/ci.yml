name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile ML scripts
        run: python -m py_compile ml/*.py scripts/*.py
      - name: Run tests
        run: python -m pytest
      - name: Auto benchmark smoke
        run: |
          python ml/generate_data.py --hours 300 --output /tmp/t.csv --seed 7
          python ml/auto_benchmark.py --data /tmp/t.csv --output-dir /tmp/auto_benchmark --max-attempts 1 --target-quality 85 --max-minutes 5 --learn
          test -f runs/.experience/memory.jsonl
