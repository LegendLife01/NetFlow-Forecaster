frr version 8.4
frr defaults datacenter
hostname spine2
log syslog informational
!
interface eth1
 description to leaf1
 ip address 10.0.5.0/31
!
interface eth2
 description to leaf2
 ip address 10.0.6.0/31
!
interface eth3
 description to leaf3
 ip address 10.0.7.0/31
!
interface eth4
 description to leaf4
 ip address 10.0.8.0/31
!
interface lo
 ip address 10.255.255.2/32
!
router bgp 65200
 bgp router-id 10.255.255.2
 bgp bestpath as-path multipath-relax
 neighbor LEAVES peer-group
 neighbor LEAVES remote-as external
 neighbor 10.0.5.1 peer-group LEAVES
 neighbor 10.0.6.1 peer-group LEAVES
 neighbor 10.0.7.1 peer-group LEAVES
 neighbor 10.0.8.1 peer-group LEAVES
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!
