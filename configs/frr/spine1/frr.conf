frr version 8.4
frr defaults datacenter
hostname spine1
log syslog informational
!
interface eth1
 description to leaf1
 ip address 10.0.1.0/31
!
interface eth2
 description to leaf2
 ip address 10.0.2.0/31
!
interface eth3
 description to leaf3
 ip address 10.0.3.0/31
!
interface eth4
 description to leaf4
 ip address 10.0.4.0/31
!
interface lo
 ip address 10.255.255.1/32
!
router bgp 65100
 bgp router-id 10.255.255.1
 bgp bestpath as-path multipath-relax
 neighbor LEAVES peer-group
 neighbor LEAVES remote-as external
 neighbor 10.0.1.1 peer-group LEAVES
 neighbor 10.0.2.1 peer-group LEAVES
 neighbor 10.0.3.1 peer-group LEAVES
 neighbor 10.0.4.1 peer-group LEAVES
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
!
